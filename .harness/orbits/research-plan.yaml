id: research-plan
name: Research Plan Orbit
description: |
    Turn ambiguous feature, refactor, API, framework, or architecture questions into evidence-backed implementation plans.
meta:
    file: .harness/orbits/research-plan.yaml
    agents_template: |
        # Research Plan Orbit
        You are responsible for one focused research-to-plan pass.

        Start by identifying the request, the decision needed, and the evidence
        available: project files, local docs, external documentation, prior records,
        logs, or user-provided constraints.

        Do not implement fixes or features inside this orbit unless explicitly
        redirected. Produce evidence-backed decisions and phased implementation
        plans, then record the result in `docs/research-plan/records/` using
        `docs/research-plan/templates/research-plan-record.md`.

        If the request cannot be scoped, required evidence is unavailable, or the
        task is actually implementation work, stop and record `blocked`, `failure`,
        `abnormal_exit`, or `external_stop` with the next useful handoff step.

        Read `docs/research-plan/README.md` for the rule contract,
        `docs/research-plan/process/` for the operating flow, and use
        `tools/check-research-plan.sh` only as a cheap record readiness probe.
    include_in_projection: true
    include_in_write: true
    include_in_export: true
    include_description_in_orchestration: true
members:
    - key: research-plan-rules
      name: Research Plan Rules
      description: Objective, boundaries, rules, done probe, and record contract.
      role: rule
      paths:
        include:
            - docs/research-plan/README.md
            - tools/check-research-plan.sh
    - key: research-plan-process
      name: Research Plan Process
      description: Triage, research, architecture, and planning process docs.
      role: process
      paths:
        include:
            - docs/research-plan/process/**
      scopes:
        export: true
    - key: research-plan-templates
      name: Research Plan Templates
      description: Reusable output templates.
      role: subject
      paths:
        include:
            - docs/research-plan/templates/**
      scopes:
        export: true
    - key: research-plan-records
      name: Research Plan Records
      description: Runtime records produced by workers.
      role: subject
      paths:
        include:
            - docs/research-plan/records/**
rules:
    scope:
        projection_roles:
            - meta
            - subject
            - rule
            - process
        write_roles:
            - meta
            - subject
            - rule
            - process
        export_roles:
            - meta
            - rule
            - process
        orchestration_roles:
            - meta
            - rule
            - process
    orchestration:
        include_orbit_description: true
        materialize_agents_from_meta: true

